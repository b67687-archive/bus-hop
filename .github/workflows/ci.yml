name: CI

on: [push, pull_request]

permissions:
    contents: read

jobs:
    build-and-test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  distribution: "temurin"
                  java-version: 17

            - name: Grant execute permission for gradlew
              run: chmod +x gradlew

            - name: Verify version matches tag
              run: |
                  TAG="${GITHUB_REF#refs/tags/}"
                  if [ "$TAG" != "$GITHUB_REF" ]; then
                    VERSION=$(grep versionName app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
                    EXPECTED="${TAG#v}"
                    if [ "$VERSION" != "$EXPECTED" ]; then
                      echo "❌ Tag $TAG but build.gradle.kts says $VERSION"
                      exit 1
                    fi
                    echo "✅ Version $VERSION matches tag $TAG"
                  fi

            - name: Run lint
              run: ./gradlew lint

            - name: Run all tests
              run: ./gradlew test

            - name: Build & verify debug APK
              run: ./gradlew checkAndRenameDebugApk
