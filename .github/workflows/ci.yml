name: CI

on: [push, pull_request]

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    GRADLE_OPTS: -Dorg.gradle.daemon=false

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  distribution: "temurin"
                  java-version: 17
            - name: Cache Gradle
              uses: actions/cache@v4
              with:
                  path: ~/.gradle/caches/
                  key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/*.kts', '**/*.toml', '**/gradle-wrapper.properties') }}
                  restore-keys: gradle-${{ runner.os }}-
            - name: Grant execute permission for gradlew
              run: chmod +x gradlew
            - name: Verify version matches tag
              run: |
                  TAG="${GITHUB_REF#refs/tags/}"
                  if [ "$TAG" != "$GITHUB_REF" ]; then
                    VERSION=$(grep versionName app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
                    EXPECTED="${TAG#v}"
                    if [ "$VERSION" != "$EXPECTED" ]; then
                      echo "❌ Tag $TAG but build.gradle.kts says $VERSION"
                      exit 1
                    fi
                    echo "✅ Version $VERSION matches tag $TAG"
                  fi
            - name: Lint (all variants)
              run: ./gradlew lint

    test-and-build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  distribution: "temurin"
                  java-version: 17
            - name: Cache Gradle
              uses: actions/cache@v4
              with:
                  path: ~/.gradle/caches/
                  key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/*.kts', '**/*.toml', '**/gradle-wrapper.properties') }}
                  restore-keys: gradle-${{ runner.os }}-
            - name: Grant execute permission for gradlew
              run: chmod +x gradlew
            - name: Run tests & build debug APK
              run: ./gradlew testDebugUnitTest assembleDebug
